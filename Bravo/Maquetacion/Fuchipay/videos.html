<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FuchiPay - Videos</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <!-- Pantalla de presentación con el logo -->
    <div id="splash-screen">
        <img src="img/fuchipay-Photoroom.png" alt="Logo de la Aplicación">
    </div>

    <nav class="sidebar close">
        <header>
            <div class="text logo">
                <span class="name">FuchiPay</span>
                <span class="profe">Reserva Canchas Aqui</span>
            </div>
            <i class="bx bx-menu toggle"></i>
        </header>
        
        <div class="menu-bar">
            <div class="menu">
                <li class="search-box">
                    <i class="bx bx-search icon"></i>
                    <input type="text" placeholder="  Buscar...">
                </li>

                <ul class="menu-links">
                    <li class="nav-link">
                        <a href="#">
                            <i class="bx bx-home-alt icon"></i>
                            <span class="text nav-text">Inicio</span>
                        </a>
                    </li>
                    <li class="nav-link">
                        <a href="#">
                            <i class="bx bx-calendar icon"></i>
                            <span class="text nav-text">Reservas</span>
                        </a>
                    </li>
                    <li class="nav-link">
                        <a href="#">
                            <i class="bx bx-football icon"></i>
                            <span class="text nav-text">Complejos</span>
                        </a>
                    </li>
                    <li class="nav-link">
                        <a href="#">
                            <i class="bx bx-user icon"></i>
                            <span class="text nav-text">Cuenta</span>
                        </a>
                    </li>
                    <li class="nav-link">
                        <a href="#">
                            <i class="bx bx-group icon"></i>
                            <span class="text nav-text">Foro</span>
                        </a>
                    </li> 
                    <li class="nav-link">
                        <a href="#">
                            <i class="bx bx-cctv icon"></i>
                            <span class="text nav-text">Videos</span>
                        </a>
                    </li> 
                </ul>
            </div>
            
            <div class="bottom-content">
                <li class="">
                    <a href="#" onclick="confirmLogout(event)">
                        <i class="bx bx-log-out icon"></i>
                        <span class="text nav-text">Salir</span>
                    </a>
                </li>
                <li class="mode">
                    <div class="sun-moon">
                        <i class="bx bx-moon icon moon"></i>
                        <i class="bx bx-sun icon sun"></i>
                    </div>
                    <span class="mode-text text">Modo Oscuro</span>
                    <div class="toggle-switch">
                        <span class="switch"></span>
                    </div>
                </li>
            </div> 
        </div>
    </nav>

   

    <script src="script.js"></script>
</body>
</html>
